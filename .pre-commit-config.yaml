repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check --fix
        language: python
        additional_dependencies: [ruff]
        types: [python]

      - id: ruff-format
        name: ruff-format
        entry: ruff format
        language: python
        additional_dependencies: [ruff]
        types: [python]

      - id: mypy
        name: mypy
        entry: scripts/run-mypy.cmd
        language: script
        pass_filenames: false

      - id: basedpyright
        name: basedpyright
        entry: scripts/run-basedpyright.cmd
        language: script
        pass_filenames: false
