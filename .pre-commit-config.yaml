repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check --fix
        language: python
        additional_dependencies: [ruff]
        types: [python]

      - id: ruff-format
        name: ruff-format
        entry: ruff format
        language: python
        additional_dependencies: [ruff]
        types: [python]
