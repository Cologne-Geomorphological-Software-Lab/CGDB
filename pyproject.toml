[tool.ruff]
line-length = 79

# Exclude-Files
exclude = [
    "**/migrations/**",
    "**/tests/**",
    "**/settings.py",
    "**/local_settings*",
]


[tool.ruff.lint]
select = ["ALL"]
ignore = [
    # --- Style / formatter conflicts ---
    "D",      # Docstring rules (D100–D107): no mandatory docstrings in this project
    "E501",   # Line too long (enforced by line-length above)
    "COM812",
    # --- Django-specific exemptions ---
    "RUF012", # ClassVar annotation on mutable class attributes: Django field descriptors
    "SLF001", # Private member accessed: Django internals regularly need _meta, _registry etc.
    "S308",   # mark_safe: only used with validated/whitelisted input in this project
    # --- Exception / try patterns that conflict with Django idioms ---
    "TRY003", # Long exception messages: Django ValidationError style
    "EM101",  # Raw string in exception: same as above
    "TRY300", # try/else block: rarely used in Django views
    "TRY301", # Abstract raise: not applicable to Django middleware/admin patterns
    "TRY400", # logging.error vs logging.exception: intentional in several hooks
    "BLE001", # Blind except Exception: necessary in some admin hooks for safety
    # --- Intentionally kept for readability in scientific/admin context ---
    "DTZ001", # datetime without tzinfo: make_aware(datetime(...)) IS the Django tz pattern
    "ERA001", # Commented-out code: disabled Dagster schedules and planned features
    "INP001", # Implicit namespace package: project layout
    # --- TYPE_CHECKING import splitting: Django ORM metaclasses make this fragile ---
    "TC001",  # Move first-party import into TYPE_CHECKING block
    "TC002",  # Move third-party import into TYPE_CHECKING block
    "TC003",  # Move standard-library import into TYPE_CHECKING block
    # --- Lazy imports inside functions: Django pattern to avoid circular imports ---
    "PLC0415",# import-outside-top-level: e.g. apps.get_model(), signals, admin inside ready()
    # --- Module-level imports after setup code: test/conf files configure Django first ---
    "E402",   # module-import-not-at-top: conftest.py, test_settings.py, docs/conf.py
    # --- Python builtins shadowed by intentional Sphinx/Django conventions ---
    "A001",   # builtin-variable-shadowing: Sphinx `copyright` variable is required
    # --- Boolean arguments: Django save_model(change), signals(created), commands(reset) use bool positionally ---
    "FBT001", # boolean-type-hint-positional-argument: Django/signal convention
    "FBT002", # boolean-default-value-positional-argument: existing internal API
    # --- pytest global for test media root: standard pytest fixture pattern ---
    "PLW0603",# global-statement: _TEST_MEDIA_ROOT shared across fixture setup/teardown
    # --- Unicode in scientific notation and technical documentation ---
    "RUF001", # Ambiguous Unicode in strings (σ, isotope symbols)
    "RUF003", # Ambiguous Unicode in comments (EN dash in ranges)
]

[tool.ruff.lint.per-file-ignores]
# Test settings use a deliberate placeholder secret key
"prototype/test_settings.py" = ["S105"]
# pytest fixture signatures (config, session, exitstatus) require specific names and may go unused
"conftest.py" = ["ANN001", "ARG001"]

[tool.ruff.lint.isort]
known-first-party = ["prototype", "field_data", "analysis", "orchestration"]
known-third-party = ["django", "rest_framework", "dagster"]

[tool.ruff.lint.pydocstyle]
convention = "google"
